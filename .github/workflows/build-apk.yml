name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Verify Java version
        run: java -version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor Android
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: michi-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Michi Build #${{ github.run_number }}"
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          body: |
            ## Michi 道 - Japanese Philosophy Daily Practice App

            Download the APK below to install on your Android device.

            ### What's included
            - Ikigai purpose-finding reflections
            - Wabi-sabi imperfection journal
            - Ma breathing timer
            - Kaizen micro-habit tracker
            - Shinrin-yoku forest walk timer
            - Gaman endurance challenges
            - Mono no aware gratitude journal
        if: github.ref == 'refs/heads/main'
