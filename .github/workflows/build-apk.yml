name: Build APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Set these repo secrets to enable release signing (Settings → Secrets → Actions):
      #   KEYSTORE_BASE64, KEYSTORE_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Read app version
        id: version
        run: echo "version=$(node --input-type=module -e "import { APP_VERSION_NUMBER } from './src/version.js'; console.log(APP_VERSION_NUMBER)")" >> $GITHUB_OUTPUT

      - name: Build web app
        run: npm run build

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync web assets to Android
        run: npx cap sync android

      - name: Generate Capacitor assets
        run: npx --yes @capacitor/assets generate --assetPath public

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease

      - name: Decode release keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/michi-release.keystore"

      - name: Sign release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          UNSIGNED=android/app/build/outputs/apk/release/app-release-unsigned.apk
          ALIGNED="$RUNNER_TEMP/michi-aligned.apk"
          ZIPALIGN=$(find "$ANDROID_HOME/build-tools" -name zipalign | sort -V | tail -1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)
          "$ZIPALIGN" -p -f -v 4 "$UNSIGNED" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks "$RUNNER_TEMP/michi-release.keystore" \
            --ks-key-alias "$KEYSTORE_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEY_PASSWORD" \
            --out android/app/build/outputs/apk/release/michi-v${{ steps.version.outputs.version }}-release.apk \
            "$ALIGNED"
        env:
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Warn if release signing is not configured
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        run: |
          echo "::warning::Release signing secrets not configured. The APK will be unsigned."

      - name: Rename APKs
        run: |
          # Keep the unsigned release clearly marked as an artifact-only file
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/michi-v${{ steps.version.outputs.version }}-release-unsigned.apk
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: michi-apk
          path: |
            android/app/build/outputs/apk/release/michi-v*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Michi v${{ steps.version.outputs.version }}"
          files: |
            android/app/build/outputs/apk/release/michi-v*-release.apk
          generate_release_notes: true
          body: |
            ## Michi 道 v${{ steps.version.outputs.version }}

            ### Download
            - **michi-v${{ steps.version.outputs.version }}-release.apk** — signed release build

            Install the APK on your Android device.

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for full details.

            ### Installation
            1. Download the APK below
            2. Open it on your Android device
            3. Allow installation from unknown sources if prompted
