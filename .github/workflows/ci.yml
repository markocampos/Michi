name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx vue-tsc --noEmit 2>&1 || true

      - name: Check for console.log in src
        run: |
          if grep -rn "console\.log" src/ --include="*.vue" --include="*.js"; then
            echo "⚠️  Found console.log statements in source code"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle Size ==="
          du -sh dist/
          echo ""
          echo "=== JS Chunks ==="
          ls -lhS dist/assets/*.js | head -10
          echo ""
          echo "=== CSS ==="
          ls -lh dist/assets/*.css
