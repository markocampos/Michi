name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Fails the build on console.log (use console.warn/error/info instead)
      - name: Check for console.log in src
        run: |
          if grep -rn "console\.log" src/ --include="*.vue" --include="*.js"; then
            echo "::error::console.log statements found in source code"
            exit 1
          fi

      - name: Check for merge conflict markers
        run: |
          if grep -rn -E "^(<<<<<<<|>>>>>>>)" src/ --include="*.vue" --include="*.js"; then
            echo "::error::merge conflict markers found in source code"
            exit 1
          fi

      - name: Validate JSON files
        run: |
          for f in package.json capacitor.config.json public/manifest.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))" || exit 1
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web app
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle Size ==="
          du -sh dist/
          echo ""
          echo "=== JS Chunks ==="
          ls -lhS dist/assets/*.js | head -10
          echo ""
          echo "=== CSS ==="
          ls -lh dist/assets/*.css
