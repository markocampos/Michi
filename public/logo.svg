<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2D5016"/>
      <stop offset="100%" style="stop-color:#4A7C28"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Enso brush stroke — open circle representing the path -->
  <path d="M256 80
    C353 80, 432 159, 432 256
    C432 353, 353 432, 256 432
    C159 432, 80 353, 80 256
    C80 180, 130 116, 200 92"
    fill="none"
    stroke="#FAFAF8"
    stroke-width="18"
    stroke-linecap="round"
    opacity="0.95"/>
  <!-- Brush stroke gap texture — the opening at the top -->
  <path d="M200 92
    C218 86, 236 82, 256 80"
    fill="none"
    stroke="url(#bg)"
    stroke-width="22"
    stroke-linecap="round"/>
  <!-- Path / road line through the center -->
  <line x1="256" y1="170" x2="256" y2="340" stroke="#FAFAF8" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Path dots representing steps -->
  <circle cx="256" cy="200" r="5" fill="#FAFAF8" opacity="0.8"/>
  <circle cx="256" cy="230" r="5" fill="#FAFAF8" opacity="0.8"/>
  <circle cx="256" cy="260" r="5" fill="#FAFAF8" opacity="0.8"/>
  <circle cx="256" cy="290" r="5" fill="#FAFAF8" opacity="0.8"/>
  <circle cx="256" cy="320" r="5" fill="#FAFAF8" opacity="0.8"/>
  <!-- Kanji 道 simplified as a subtle watermark -->
  <text x="256" y="270" text-anchor="middle" font-family="serif" font-size="48" fill="#FAFAF8" opacity="0.15">道</text>
</svg>
